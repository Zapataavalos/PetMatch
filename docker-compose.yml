# ============================================================
# PetMatch — Arquitectura completa
# Incluye: Eureka + API Gateway + RabbitMQ + 8 microservicios + 8 MySQL
# ============================================================

services:
  # ============================================================
  # INFRAESTRUCTURA
  # ============================================================

  rabbitmq:
    image: rabbitmq:3.13-management-alpine 
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: petmatch
      RABBITMQ_DEFAULT_PASS: petmatch2026
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    networks:
      - petmatch-net

  # ============================================================
  # BASES DE DATOS - SERVICIOS DEL COMPAÑERO
  # ============================================================

  mysql-animal-type:
    image: mysql:8.0
    container_name: mysql-animal-type
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: animal_type_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_animal_type_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-size:
