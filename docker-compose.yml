version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
# PetMatch — docker-compose.yml
# Levanta los 8 microservicios + sus bases MySQL + API Gateway
#
# Orden de arranque (depends_on):
#   MySQL → ms-animal-type → ms-size → ms-race → ms-pet
#        → ms-report-type → ms-report-status → ms-pet-color → ms-report
#
# Uso:
#   docker-compose up --build          (primera vez)
#   docker-compose up -d               (en background)
#   docker-compose down                (detener todo)
#   docker-compose down -v             (detener + borrar volúmenes)
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────────────
  # BASES DE DATOS MySQL — una por microservicio (Database per Service)
  # ─────────────────────────────────────────────────────────────────────────

  mysql-animal-type:
    image: mysql:8.0
    container_name: mysql-animal-type
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: animal_type_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_animal_type_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-size:
    image: mysql:8.0
    container_name: mysql-size
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: size_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_size_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-race:
    image: mysql:8.0
    container_name: mysql-race
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: race_db
    ports:
      - "3309:3306"
    volumes:
      - mysql_race_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pet:
    image: mysql:8.0
    container_name: mysql-pet
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: pet_db
    ports:
      - "3310:3306"
    volumes:
      - mysql_pet_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pet-color:
    image: mysql:8.0
    container_name: mysql-pet-color
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: pet_color_db
    ports:
      - "3311:3306"
    volumes:
      - mysql_pet_color_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report-type:
    image: mysql:8.0
    container_name: mysql-report-type
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_type_db
    ports:
      - "3312:3306"
    volumes:
      - mysql_report_type_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report-status:
    image: mysql:8.0
    container_name: mysql-report-status
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_status_db
    ports:
      - "3313:3306"
    volumes:
      - mysql_report_status_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report:
    image: mysql:8.0
    container_name: mysql-report
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_db
    ports:
      - "3314:3306"
    volumes:
      - mysql_report_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # MICROSERVICIOS — en orden de dependencia según el MER
  # ─────────────────────────────────────────────────────────────────────────

  ms-animal-type:
    build:
      context: ./ms-animal-type
      dockerfile: Dockerfile
    container_name: ms-animal-type
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-animal-type:3306/animal_type_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
    depends_on:
      mysql-animal-type:
        condition: service_healthy
    networks:
      - petmatch-net

  ms-size:
    build:
      context: ./ms-size
      dockerfile: Dockerfile
    container_name: ms-size
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-size:3306/size_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
    depends_on:
      mysql-size:
        condition: service_healthy
    networks:
      - petmatch-net

  ms-race:
    build:
      context: ./ms-race
      dockerfile: Dockerfile
    container_name: ms-race
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-race:3306/race_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
      MS_ANIMAL-TYPE_URL: http://ms-animal-type:8083
    depends_on:
      mysql-race:
        condition: service_healthy
      ms-animal-type:
        condition: service_started
    networks:
      - petmatch-net

  ms-pet:
    build:
      context: ./ms-pet
      dockerfile: Dockerfile
    container_name: ms-pet
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-pet:3306/pet_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
    depends_on:
      mysql-pet:
        condition: service_healthy
      ms-race:
        condition: service_started
      ms-size:
        condition: service_started
    networks:
      - petmatch-net

  ms-report-type:
    build:
      context: ./ms-report-type
      dockerfile: Dockerfile
    container_name: ms-report-type
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-report-type:3306/report_type_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
    depends_on:
      mysql-report-type:
        condition: service_healthy
    networks:
      - petmatch-net

  ms-report-status:
    build:
      context: ./ms-report-status
      dockerfile: Dockerfile
    container_name: ms-report-status
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-report-status:3306/report_status_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
    depends_on:
      mysql-report-status:
        condition: service_healthy
    networks:
      - petmatch-net

  ms-pet-color:
    build:
      context: ./ms-pet-color
      dockerfile: Dockerfile
    container_name: ms-pet-color
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-pet-color:3306/pet_color_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
      MS_PET_URL: http://ms-pet:8081
    depends_on:
      mysql-pet-color:
        condition: service_healthy
      ms-pet:
        condition: service_started
    networks:
      - petmatch-net

  ms-report:
    build:
      context: ./ms-report
      dockerfile: Dockerfile
    container_name: ms-report
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-report:3306/report_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petmatch2026
      JWT_SECRET: PetMatchSecretKey2026_SanosYSalvos
      MS_PET_URL: http://ms-pet:8081
      MS_REPORT-TYPE_URL: http://ms-report-type:8086
      MS_REPORT-STATUS_URL: http://ms-report-status:8087
    depends_on:
      mysql-report:
        condition: service_healthy
      ms-pet:
        condition: service_started
      ms-report-type:
        condition: service_started
      ms-report-status:
        condition: service_started
    networks:
      - petmatch-net

# ─────────────────────────────────────────────────────────────────────────
# VOLÚMENES — persistencia de datos MySQL
# ─────────────────────────────────────────────────────────────────────────
volumes:
  mysql_animal_type_data:
  mysql_size_data:
  mysql_race_data:
  mysql_pet_data:
  mysql_pet_color_data:
  mysql_report_type_data:
  mysql_report_status_data:
  mysql_report_data:

# ─────────────────────────────────────────────────────────────────────────
# RED — todos los servicios se comunican dentro de esta red
# ─────────────────────────────────────────────────────────────────────────
networks:
  petmatch-net:
    driver: bridge
