version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
# PetMatch — Arquitectura completa
# Incluye: Eureka + API Gateway + RabbitMQ + 8 microservicios + 8 MySQL
#
# Orden de arranque:
#   1. RabbitMQ + MySQL (bases)
#   2. Eureka Server
#   3. Microservicios (se registran en Eureka)
#   4. API Gateway (enruta via Eureka)
#
# Uso:
#   docker-compose up --build
#   docker-compose down -v  (borra datos)
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────────────
  # RABBITMQ — mensajería asíncrona
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Dashboard web
    environment:
      RABBITMQ_DEFAULT_USER: petmatch
      RABBITMQ_DEFAULT_PASS: petmatch2026
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # EUREKA SERVER — Service Discovery
  # Dashboard: http://localhost:8761
  # ─────────────────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # BASES DE DATOS MySQL
  # ─────────────────────────────────────────────────────────────────────────
  mysql-animal-type:
    image: mysql:8.0
    container_name: mysql-animal-type
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: animal_type_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_animal_type_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-size:
    image: mysql:8.0
    container_name: mysql-size
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: size_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_size_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-race:
    image: mysql:8.0
    container_name: mysql-race
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: race_db
    ports:
      - "3309:3306"
    volumes:
      - mysql_race_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pet:
    image: mysql:8.0
    container_name: mysql-pet
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: pet_db
    ports:
      - "3310:3306"
    volumes:
      - mysql_pet_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pet-color:
    image: mysql:8.0
    container_name: mysql-pet-color
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: pet_color_db
    ports:
      - "3311:3306"
    volumes:
      - mysql_pet_color_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report-type:
    image: mysql:8.0
    container_name: mysql-report-type
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_type_db
    ports:
      - "3312:3306"
    volumes:
      - mysql_report_type_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report-status:
    image: mysql:8.0
    container_name: mysql-report-status
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_status_db
    ports:
      - "3313:3306"
    volumes:
      - mysql_report_status_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-report:
    image: mysql:8.0
    container_name: mysql-report
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: petmatch2026
      MYSQL_DATABASE: report_db
    ports:
      - "3314:3306"
    volumes:
      - mysql_report_data:/var/lib/mysql
    networks:
      - petmatch-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppetmatch2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────────────────────────────────────

  ms-animal-type:
    build: { context: ./ms-animal-type, dockerfile: Dockerfile }
    container_name: ms-animal-type
    restart: unless-stopped
    ports: ["8083:8083"]
    depends_on:
      mysql-animal-type: { condition: service_healthy }
      eureka-server:     { condition: service_healthy }
      rabbitmq:          { condition: service_healthy }
    networks: [petmatch-net]

  ms-size:
    build: { context: ./ms-size, dockerfile: Dockerfile }
    container_name: ms-size
    restart: unless-stopped
    ports: ["8084:8084"]
    depends_on:
      mysql-size:    { condition: service_healthy }
      eureka-server: { condition: service_healthy }
      rabbitmq:      { condition: service_healthy }
    networks: [petmatch-net]

  ms-race:
    build: { context: ./ms-race, dockerfile: Dockerfile }
    container_name: ms-race
    restart: unless-stopped
    ports: ["8082:8082"]
    depends_on:
      mysql-race:    { condition: service_healthy }
      eureka-server: { condition: service_healthy }
      rabbitmq:      { condition: service_healthy }
      ms-animal-type: { condition: service_started }
    networks: [petmatch-net]

  ms-pet:
    build: { context: ./ms-pet, dockerfile: Dockerfile }
    container_name: ms-pet
    restart: unless-stopped
    ports: ["8081:8081"]
    depends_on:
      mysql-pet:     { condition: service_healthy }
      eureka-server: { condition: service_healthy }
      rabbitmq:      { condition: service_healthy }
      ms-race:       { condition: service_started }
      ms-size:       { condition: service_started }
    networks: [petmatch-net]

  ms-report-type:
    build: { context: ./ms-report-type, dockerfile: Dockerfile }
    container_name: ms-report-type
    restart: unless-stopped
    ports: ["8086:8086"]
    depends_on:
      mysql-report-type: { condition: service_healthy }
      eureka-server:     { condition: service_healthy }
      rabbitmq:          { condition: service_healthy }
    networks: [petmatch-net]

  ms-report-status:
    build: { context: ./ms-report-status, dockerfile: Dockerfile }
    container_name: ms-report-status
    restart: unless-stopped
    ports: ["8087:8087"]
    depends_on:
      mysql-report-status: { condition: service_healthy }
      eureka-server:       { condition: service_healthy }
      rabbitmq:            { condition: service_healthy }
    networks: [petmatch-net]

  ms-pet-color:
    build: { context: ./ms-pet-color, dockerfile: Dockerfile }
    container_name: ms-pet-color
    restart: unless-stopped
    ports: ["8085:8085"]
    depends_on:
      mysql-pet-color: { condition: service_healthy }
      eureka-server:   { condition: service_healthy }
      rabbitmq:        { condition: service_healthy }
      ms-pet:          { condition: service_started }
    networks: [petmatch-net]

  ms-report:
    build: { context: ./ms-report, dockerfile: Dockerfile }
    container_name: ms-report
    restart: unless-stopped
    ports: ["8088:8088"]
    depends_on:
      mysql-report:       { condition: service_healthy }
      eureka-server:      { condition: service_healthy }
      rabbitmq:           { condition: service_healthy }
      ms-pet:             { condition: service_started }
      ms-report-type:     { condition: service_started }
      ms-report-status:   { condition: service_started }
    networks: [petmatch-net]

  # ─────────────────────────────────────────────────────────────────────────
  # API GATEWAY — punto de entrada único (puerto 8080)
  # ─────────────────────────────────────────────────────────────────────────
  api-gateway:
    build: { context: ./api-gateway, dockerfile: Dockerfile }
    container_name: api-gateway
    restart: unless-stopped
    ports: ["8080:8080"]
    depends_on:
      eureka-server:   { condition: service_healthy }
      ms-pet:          { condition: service_started }
      ms-report:       { condition: service_started }
    networks: [petmatch-net]

volumes:
  rabbitmq_data:
  mysql_animal_type_data:
  mysql_size_data:
  mysql_race_data:
  mysql_pet_data:
  mysql_pet_color_data:
  mysql_report_type_data:
  mysql_report_status_data:
  mysql_report_data:

networks:
  petmatch-net:
    driver: bridge
