server.port=${SERVER_PORT:8080}

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET:PetMatchJwtSecretKey2026DebeTenerMasDe32Caracteres}

spring.cloud.gateway.routes[0].id=usuario-service
spring.cloud.gateway.routes[0].uri=${USUARIO_SERVICE_URI:http://usuario-service:8094}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**,/api/v1/usuarios,/api/v1/usuarios/**

spring.cloud.gateway.routes[1].id=rol-service
spring.cloud.gateway.routes[1].uri=${ROL_SERVICE_URI:http://rol-service:8090}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/roles/**

spring.cloud.gateway.routes[2].id=ms-pet
spring.cloud.gateway.routes[2].uri=lb://ms-pet
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/pet,/api/pet/**

spring.cloud.gateway.routes[3].id=ms-race
spring.cloud.gateway.routes[3].uri=lb://ms-race
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/race/**

spring.cloud.gateway.routes[4].id=ms-animal-type
spring.cloud.gateway.routes[4].uri=lb://ms-animal-type
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/animal-type/**

spring.cloud.gateway.routes[5].id=ms-size
spring.cloud.gateway.routes[5].uri=lb://ms-size
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/size/**

spring.cloud.gateway.routes[6].id=ms-pet-color
spring.cloud.gateway.routes[6].uri=lb://ms-pet-color
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/pet-color/**,/api/color/**

spring.cloud.gateway.routes[7].id=ms-report
spring.cloud.gateway.routes[7].uri=lb://ms-report
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/report,/api/report/**

spring.cloud.gateway.routes[8].id=ms-report-type
spring.cloud.gateway.routes[8].uri=lb://ms-report-type
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/report-type/**

spring.cloud.gateway.routes[9].id=ms-report-status
spring.cloud.gateway.routes[9].uri=lb://ms-report-status
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/report-status/**

spring.cloud.gateway.routes[10].id=pais-service
spring.cloud.gateway.routes[10].uri=${PAIS_SERVICE_URI:http://pais-service:8091}
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/paises/**

spring.cloud.gateway.routes[11].id=region-service
spring.cloud.gateway.routes[11].uri=${REGION_SERVICE_URI:http://region-service:8097}
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/v1/regiones/**

spring.cloud.gateway.routes[12].id=ciudad-service
spring.cloud.gateway.routes[12].uri=${CIUDAD_SERVICE_URI:http://ciudad-service:8092}
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/v1/ciudades/**

spring.cloud.gateway.routes[13].id=color-service
spring.cloud.gateway.routes[13].uri=${COLOR_SERVICE_URI:http://color-service:8093}
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/v1/colores,/api/v1/colores/**

spring.cloud.gateway.routes[14].id=configuracion-usuario-service
spring.cloud.gateway.routes[14].uri=${CONFIGURACION_USUARIO_SERVICE_URI:http://configuracion-usuario-service:8095}
