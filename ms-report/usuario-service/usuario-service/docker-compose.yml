services:
  usuario-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usuario-service
    ports:
      - "8094:8094"
    environment:
      SERVER_PORT: 8094
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/usuario_db?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_SECRET: PetMatchJwtSecretKey2026DebeTenerMasDe32Caracteres
      JWT_EXPIRATION_MS: 86400000
    restart: unless-stopped