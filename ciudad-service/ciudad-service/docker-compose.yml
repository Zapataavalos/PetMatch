services:
  ciudad-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ciudad-service
    ports:
      - "8092:8092"
    environment:
      SERVER_PORT: 8092
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/ciudad_db?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    restart: unless-stopped